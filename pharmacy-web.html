<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>굿팜 약국용 · AI mate 추천 상품 설정</title>
<style>
  :root{
    --teal:#16c0a4; --teal-d:#0ea58b; --teal-soft:#e6f8f4; --teal-line:#bfe9e1;
    --ink:#2a313b; --muted:#7b8794; --faint:#9aa4af; --line:#e9ecf0; --bg:#f5f7f9;
    --amber:#c98a12; --blue:#2a6fc0; --danger:#d8453a; --ok:#16a34a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
    color:var(--ink);background:#eef1f4;font-size:13.5px;line-height:1.55}
  .app{display:flex;min-height:100vh;background:#fff}
  /* 사이드바 */
  .side{width:210px;flex:none;border-right:1px solid var(--line);padding:16px 12px;background:#fff}
  .brand{display:flex;align-items:center;gap:7px;font-weight:800;font-size:17px;padding:4px 6px 14px}
  .brand .mk{color:var(--teal);font-size:17px}
  .brand .bdg{font-size:10px;font-weight:700;color:var(--teal-d);background:var(--teal-soft);border-radius:5px;padding:2px 6px}
  .seg{display:flex;gap:6px;margin:0 4px 16px}
  .seg button{flex:1;border:1px solid var(--line);background:#fff;color:var(--muted);font-family:inherit;font-weight:700;font-size:12px;border-radius:7px;padding:7px 0;cursor:pointer}
  .seg button.on{background:var(--teal);border-color:var(--teal);color:#fff}
  .nav-h{font-size:11px;font-weight:700;color:var(--faint);padding:10px 8px 5px}
  .nav a{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;color:#4a525c;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer}
  .nav a:hover{background:#f4f6f8}
  .nav a.on{background:var(--teal-soft);color:var(--teal-d);font-weight:800}
  .nav a .ic{width:16px;text-align:center;color:var(--faint)}
  .nav a.on .ic{color:var(--teal-d)}
  .nav a .cv{margin-left:auto;color:var(--faint);font-size:11px}

  /* 메인 */
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;padding:16px 26px;border-bottom:1px solid var(--line)}
  .top .pg{font-size:18px;font-weight:800}
  .top .me{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:12.5px}
  .top .me .av{width:30px;height:30px;border-radius:50%;background:#dfe6ea;display:flex;align-items:center;justify-content:center;color:#90a0a8}
  .top .me b{font-weight:800}.top .me span{color:var(--muted);font-size:11px;display:block}
  .wrap{padding:22px 26px;flex:1}

  .bar{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  .sel,.inp{height:36px;border:1px solid var(--line);border-radius:8px;padding:0 12px;font-size:13px;color:var(--ink);background:#fff;outline:none;font-family:inherit}
  .sel{appearance:none;-webkit-appearance:none;padding-right:28px;cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,#9aa0a6 50%),linear-gradient(135deg,#9aa0a6 50%,transparent 50%);
    background-position:calc(100% - 15px) 16px,calc(100% - 10px) 16px;background-size:5px 5px,5px 5px;background-repeat:no-repeat}
  .inp.search{width:280px}
  .inp.fw{width:100%;height:38px}
  textarea.inp{width:100%;height:auto;padding:9px 12px;line-height:1.6;resize:vertical;min-height:74px}
  .btn{height:36px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:#4b5158;font-family:inherit}
  .btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
  .btn.primary:hover{background:var(--teal-d)}
  .btn.sm{height:30px;padding:0 11px;font-size:12px}
  .btn.danger{color:var(--danger);border-color:#f0c9c4}
  .spacer{flex:1}
  .cnt{font-size:12.5px;color:var(--muted)}.cnt b{color:var(--ink)}

  table{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl{border:1px solid var(--line);border-radius:10px;overflow:hidden}
  thead th{background:#f6f8fa;color:#5c6671;font-weight:700;text-align:left;padding:11px 14px;border-bottom:1px solid var(--line)}
  thead th.c{text-align:center}
  tbody td{padding:12px 14px;border-bottom:1px solid #eef1f4;color:#3a424c}
  tbody td.c{text-align:center}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.click{cursor:pointer}tbody tr.click:hover{background:#f7faf9}
  .nut{font-weight:700}
  .onoff{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:6px}
  .onoff.on{background:#e7f6ee;color:var(--ok)}.onoff.off{background:#f0eef2;color:#8b8b97}
  .modmeta{color:var(--muted);font-size:11.5px}
  .chev{color:var(--faint)}
  .acts{display:flex;gap:6px;justify-content:center}

  /* 가운데 모달 (상세 · 항목 추가 공통) */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(20,26,32,.45);z-index:50;align-items:center;justify-content:center;padding:24px}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;box-shadow:0 34px 90px -30px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column;max-height:88vh}
  .modal.lg{max-width:640px}
  .modal.sm{max-width:560px}
  .m-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px}
  .m-head .dt{font-size:17px;font-weight:800}
  .m-head .ds{font-size:12px;color:var(--muted);margin-top:3px}
  .m-head .x{margin-left:auto;font-size:20px;color:var(--faint);cursor:pointer;border:none;background:none}
  .m-body{padding:18px 22px;overflow:auto;flex:1}
  .m-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:8px}
  .m-foot .btn{flex:1}

  .block{margin-bottom:22px}
  .block:last-child{margin-bottom:0}
  .block-h{font-size:13px;font-weight:800;margin:0 0 9px;display:flex;align-items:center;gap:8px}
  .kvs{border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .kv{display:flex;font-size:12.5px;border-bottom:1px solid #eef1f4}.kv:last-child{border:none}
  .kv .k{width:130px;flex:none;background:#f7f9fb;color:var(--muted);font-weight:700;padding:9px 12px;display:flex;align-items:center}
  .kv .v{padding:9px 12px;color:#333;flex:1}
  .readbox{border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:12.5px;color:#4a525c;line-height:1.65;background:#fbfdfc}
  .prod-list{display:flex;flex-direction:column;gap:7px}
  /* 출처별 섹션 헤더 */
  .pg-h{font-size:12px;font-weight:800;color:#3a424c;display:flex;align-items:center;gap:8px;margin:2px 0 1px}
  .pg-h.store{margin-top:13px;color:var(--teal-d)}
  .pg-h .pg-ro{font-size:10.5px;font-weight:700;color:var(--faint);background:#f0f2f4;border-radius:5px;padding:1px 7px}
  .pnum{font-weight:800;color:var(--teal-d);width:16px;text-align:center;font-size:12px}
  .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#dbe2e5;color:#5a6771;font-size:9px;font-weight:800;cursor:help}
  .info .tip-pop{display:none;position:absolute;left:0;top:135%;z-index:30;width:236px;background:#28303a;color:#fff;font-size:11px;font-weight:500;line-height:1.55;border-radius:8px;padding:9px 11px;box-shadow:0 12px 28px -10px rgba(0,0,0,.45)}
  .info:hover .tip-pop,.info:focus .tip-pop{display:block}
  .info .tip-pop b{color:#7fe0d0;font-weight:800}
  .pg-h .pg-cnt{font-size:10.5px;font-weight:800;color:var(--teal-d);background:var(--teal-soft);border-radius:5px;padding:1px 7px}
  .pempty{font-size:11.5px;color:#9aa4af;padding:8px 12px;border:1px dashed var(--line);border-radius:9px;background:#fbfcfd}
  .pitem.ro{background:#fafbfc}
  .pitem .kd.gp{background:#eef2f6;color:#5c6671}
  .pitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:9px 12px}
  .pitem .ord{display:flex;flex-direction:column;gap:2px;color:var(--faint)}
  .pitem .ord button{border:none;background:none;cursor:pointer;color:var(--faint);font-size:11px;line-height:1}
  .pitem .pn{flex:1;min-width:0}
  .pitem .pn .nm{font-weight:700;font-size:13px}
  .pitem .pn .bc{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--faint);margin-top:2px}
  .pitem .kd{font-size:10.5px;font-weight:700;background:#e7f3ee;color:#1f8a6c;border-radius:5px;padding:2px 7px}
  .tg{position:relative;width:38px;height:22px;border-radius:999px;background:#d6dde2;cursor:pointer;flex:none;transition:background .15s}
  .tg.on{background:var(--teal)}
  .tg::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .15s}
  .tg.on::after{left:18px}
  .exprow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:10px 14px;background:#fbfdfc}
  .exprow .el{font-weight:700}
  .exprow .es{font-size:11.5px;color:var(--muted);margin-top:2px}
  .hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.55}
  .ro{color:var(--faint);font-size:11px;font-weight:700;background:#f4f6f8;border-radius:5px;padding:2px 7px}
  .soon{color:var(--amber);font-size:11px;font-weight:700;background:#fbf1dd;border-radius:5px;padding:2px 7px}

  /* 변경 이력 */
  .hist{border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .hrow{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-bottom:1px solid #eef1f4;font-size:12px}
  .hrow:last-child{border:none}
  .hrow .hd{color:var(--muted);white-space:nowrap;width:74px;flex:none}
  .hby{font-size:10.5px;font-weight:800;border-radius:5px;padding:2px 7px;white-space:nowrap;flex:none}
  .hby.admin{background:#eef1ff;color:#4457c7}
  .hby.store{background:var(--teal-soft);color:var(--teal-d)}
  .hnote{flex:1;color:#3a424c}

  /* 바코드 검색 모달 */
  .res{border:1px solid var(--line);border-radius:9px;margin-top:12px;max-height:260px;overflow:auto}
  .res .r{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid #eef1f4;cursor:pointer}
  .res .r:last-child{border:none}.res .r:hover{background:#f7faf9}
  .res .r .nm{font-weight:700;font-size:13px}.res .r .bc{font-family:ui-monospace,Menlo,monospace;font-size:10.5px;color:var(--faint)}
  .res .r .add{margin-left:auto;font-size:12px;font-weight:800;color:var(--teal-d)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#28303a;color:#fff;font-size:13px;padding:11px 18px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:70}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <!-- 사이드바 -->
  <aside class="side">
    <div class="brand"><span class="mk">◭ 굿팜</span><span class="bdg">약국용</span></div>
    <div class="seg"><button>모바일 약국</button><button class="on">굿팜 솔루션</button></div>
    <div class="nav-h">굿팜 솔루션</div>
    <nav class="nav">
      <a><span class="ic">▥</span>대시보드</a>
      <a><span class="ic">▦</span>페이앱</a>
      <a><span class="ic">◔</span>경영분석<span class="cv">▾</span></a>
      <a><span class="ic">🏠</span>약국 포인트 운영 관리</a>
      <a class="on"><span class="ic">✦</span>AI mate 추천 상품</a>
    </nav>
    <div class="nav-h">기타</div>

      <a><span class="ic">📢</span>공지사항</a>
    </nav>
  </aside>

  <!-- 메인 -->
  <div class="main">
    <div class="top">
      <div class="pg">AI mate 추천 상품 설정</div>
      <div class="me"><span class="av">👤</span><div><b>임한일</b><span>대표약사</span></div></div>
    </div>
    <div class="wrap">
      <div class="bar">
        <span class="cnt">전체 <b id="cntNum">6</b>건</span>
        <span class="spacer"></span>
      </div>

      <div class="tbl">
        <table>
          <thead><tr>
            <th>부족 영양소</th><th>관련 카테고리</th><th>추천 효능군</th>
            <th class="c">관련 약물 수</th><th>굿팜 추천 상품</th><th>우리약국 추천 상품</th>
            <th class="c">노출 상태</th><th>최종 수정</th>
          </tr></thead>
          <tbody id="listBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 상세 / 항목 추가 (가운데 모달) -->
<div class="modal-bg" id="detailBg" onclick="if(event.target===this)closeDetail()">
  <div class="modal lg">
    <div class="m-head">
      <div><div class="dt" id="mTitle">—</div><div class="ds" id="mSub">—</div></div>
      <button class="x" onclick="closeDetail()">✕</button>
    </div>
    <div class="m-body">
      <div class="block">
        <div class="block-h" id="basicH">기본 정보</div>
        <div class="kvs" id="mBasic"></div>
      </div>
      <div class="block">
        <div class="block-h" id="infoH">부족해지는 근거</div>
        <div id="mInfoWrap"></div>
      </div>
      <div class="block">
        <div class="block-h">추천 상품 <span id="mProdMeta" style="margin-left:auto;font-size:11px;font-weight:600;color:var(--muted)">최종 수정일 -</span></div>
        <div class="prod-list" id="mProds"></div>
        <div class="hint" id="mHint"></div>
        <div style="margin-top:10px">
          <button class="btn sm" onclick="openSearch()">＋ 우리약국 추천 상품 추가</button>
        </div>
      </div>
    </div>
    <div class="m-foot" id="mFoot"></div>
  </div>
</div>

<!-- 서버 마스터 상품 검색 모달 -->
<div class="modal-bg" id="searchModal">
  <div class="modal sm">
    <div class="m-head" style="padding-bottom:16px"><div class="dt">상품 검색 <span style="font-size:12px;font-weight:600;color:var(--muted)">서버 마스터 상품 데이터 기준</span></div><button class="x" onclick="closeSearch()">✕</button></div>
    <div class="m-body">
      <div class="bar" style="margin:0">
        <select class="sel"><option>바코드</option><option>상품명</option></select>
        <input class="inp search" id="searchInp" placeholder="바코드 또는 상품명 입력" oninput="renderRes()" />
        <button class="btn primary sm">검색</button>
      </div>
      <div class="hint" style="margin:8px 2px 0">POS 미사용 약국도 등록 가능하도록, 약국 로컬 데이터가 아닌 <b>서버 마스터 상품 데이터</b>에서 검색해 추가합니다.</div>
      <div class="res" id="searchRes"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// 약사웹 추천 상품 설정 데이터 (부족 영양소 단위) — 추천 상품은 부족 영양소에 종속.

  { id:3, nut:"마그네슘", nid:"NUT-MG", cat:"마그네슘 및 미네랄제품", eff:"대사케어", on:true,

  { id:4, nut:"비타민 D", nid:"NUT-VD", cat:"비타민 D", eff:"뼈&관절케어", on:false,
    mod:"2026-06-12", modBy:"store",
    drugs:[ {code:"H02AB06", comp:"프레드니솔론", form:"정제(TB)", reason:"스테로이드 장기 사용은 비타민 D 대사와 골대사에 영향을 주어 부족 위험"} ],
    prods:[ {nm:"○○ 비타민D 2000IU", bc:"8803333000044", kind:"건기식", def:true} ],
    history:[ {date:"2026-06-10", by:"admin", note:"기본 추천 상품 등록"},
              {date:"2026-06-12", by:"store", note:"우리약국 추천 상품 조정"} ] },
  { id:5, nut:"칼슘", nid:"NUT-CA", cat:"칼슘 및 미네랄제품", eff:"뼈&관절케어", on:true,
    mod:"2026-06-22", modBy:"store",
    drugs:[ {code:"A02BC01", comp:"오메프라졸", form:"장용캡슐(CE)", reason:"위산 감소로 칼슘의 이온화·흡수가 저하되어 부족 위험"},
            {code:"H02AB06", comp:"프레드니솔론", form:"정제(TB)", reason:"스테로이드는 장내 칼슘 흡수를 줄이고 배설을 늘려 부족 위험"} ],
    prods:[ {nm:"○○ 칼슘 마그네슘 D", bc:"8804444000055", kind:"건기식", on:true, def:false} ],
    history:[ {date:"2026-06-17", by:"admin", note:"기본 항목 생성"},
              {date:"2026-06-22", by:"store", note:"약국 상품으로 교체"} ] },
  { id:6, nut:"엽산", nid:"NUT-FOL", cat:"비타민 B군, 종합비타민", eff:"혈액순환&혈관케어", on:false,
    mod:"-", modBy:"admin",
    drugs:[ {code:"L04AX03", comp:"메토트렉세이트", form:"정제(TB)", reason:"엽산 대사를 길항 — 보충 여부는 처방 의도 확인 필요"} ],
    prods:[ {nm:"○○ 엽산 400mcg", bc:"8805555000066", kind:"건기식", on:true, def:true} ],
    history:[ {date:"2026-06-14", by:"admin", note:"기본 추천 상품 등록"} ] }
];
// 서버 마스터 상품 데이터(전체 상품 마스터) — 약국 로컬/POS 데이터가 아니라 서버에서 검색·등록.
// 표시 기준은 제조사(mfr): 바코드는 약국 매입처마다 다를 수 있어 제조사 표기가 더 정확.
var DB = [
  {nm:"○○ 비타민B 컴플렉스", bc:"8801111000022", kind:"건기식", mfr:"대웅제약"},
  {nm:"○○ 코엔자임Q10 100mg", bc:"8802222000033", kind:"건기식", mfr:"고려은단"},
  {nm:"△△ 마그네슘 400", bc:"8806666000077", kind:"건기식", mfr:"나우푸드"},
  {nm:"○○ 비타민D 2000IU", bc:"8803333000044", kind:"건기식", mfr:"뉴트리디데이"},
  {nm:"□□ 락토페린 이뮨", bc:"8807777000088", kind:"건기식", mfr:"일동제약"},
  {nm:"△△ 오메가3 알티지", bc:"8808888000099", kind:"건기식", mfr:"종근당건강"}
];
// 상품 제조사 조회(서버 마스터 기준) — 목록/상세에 바코드 대신 제조사 표기
var MFR_MAP = {
  "8801111000022":"대웅제약", "8809001112223":"종근당건강", "8802222000033":"고려은단",
  "8802222000040":"뉴트리원", "8804444000055":"GNM 자연의품격", "8803333000044":"뉴트리디데이",
  "8805555000066":"솔가", "8806666000077":"나우푸드"
};
function mfrOf(p){ return (p&&p.mfr) || MFR_MAP[p&&p.bc] || '-'; }
var cur = null;       // 편집 중 row (deep copy 또는 신규 draft)
var mode = 'view';    // 'view' | 'new'
var seq = 100;        // 신규 id 시퀀스
// 현재 로그인 사용자 = 약국(대표약사). 저장 시 수정자 = 'store'
var ME = 'store';
// 추천 상품 최대 개수 — 클라이언트(AI mate) 노출 최적화 기준. 4개로 늘리려면 이 값만 변경.
var MAX_PRODS = 3;

function byLabel(b){ return b==='admin' ? '어드민' : '약국'; }
function clone(r){ return JSON.parse(JSON.stringify(r)); }

function renderList(){
  var b=document.getElementById('listBody');b.innerHTML='';
  rows.forEach(function(r){
    var gp=r.prods.filter(function(p){return p.def;});
    var store=r.prods.filter(function(p){return !p.def;});
    var gpTxt = gp.length ? gp.map(function(p){return p.nm;}).join('<br>') : '<span style="color:#9aa4af">-</span>';
    var stTxt = store.length ? store.map(function(p){return p.nm;}).join('<br>') : '<span style="color:#9aa4af">미설정</span>';
    var ndrug=(r.drugs&&r.drugs.length)||0;
    var modtxt = r.mod==='-' ? '<span style="color:#9aa4af">-</span>' : r.mod;
    b.insertAdjacentHTML('beforeend',
      '<tr class="click" onclick="openDetail('+r.id+')"><td class="nut">'+r.nut+'</td>'+
      '<td>'+(r.cat||'-')+'</td><td>'+(r.eff||'-')+'</td>'+
      '<td class="c">'+ndrug+'</td>'+
      '<td style="white-space:normal">'+gpTxt+'</td><td style="white-space:normal">'+stTxt+'</td>'+
      '<td class="c"><span class="onoff '+(r.on?'on':'off')+'">'+(r.on?'ON':'OFF')+'</span></td>'+
      '<td>'+modtxt+'</td></tr>');
  });
  document.getElementById('cntNum').textContent = rows.length;
}
function deleteRow(id){
  if(!confirm('이 항목을 삭제할까요? 삭제하면 AI mate 추천에서 제외됩니다.')) return;
  var idx=rows.findIndex(function(x){return x.id===id});
  if(idx>-1) rows.splice(idx,1);
  renderList(); toast('항목을 삭제했습니다.');
}

/* ── 상세(기존 항목) / 항목 추가(신규) 공통 모달 ── */
function openDetail(id){
  mode='view';
  var r=rows.find(function(x){return x.id===id}); cur=clone(r);
  var ndrug=(cur.drugs&&cur.drugs.length)||0;
  document.getElementById('mTitle').textContent=cur.nut;
  document.getElementById('mSub').textContent='부족 영양소 ID '+(cur.nid||'-')+' · 관련 약물 '+ndrug+'개';
  document.getElementById('basicH').innerHTML='기본 정보';
  document.getElementById('infoH').innerHTML='관련 약물 <span style="font-weight:600;color:var(--muted);font-size:11px">이 부족 영양소와 연결된 약물 (조회 전용)</span>';
  document.getElementById('mBasic').innerHTML=
    '<div class="kv"><div class="k">부족 영양소</div><div class="v">'+cur.nut+'</div></div>'+
    '<div class="kv"><div class="k">관련 카테고리</div><div class="v">'+(cur.cat||'-')+'</div></div>'+
    '<div class="kv"><div class="k">추천 효능군</div><div class="v">'+(cur.eff||'-')+'</div></div>'+
    '<div class="kv"><div class="k">관련 약물 수</div><div class="v">'+ndrug+'개</div></div>';
  document.getElementById('mProdMeta').innerHTML='최종 수정일 '+(cur.mod==='-'?'-':cur.mod);
  document.getElementById('mInfoWrap').innerHTML=relDrugsHtml(cur.drugs)+
    '<div class="hint">부족해지는 <b>이유·근거</b>는 <b>(성분코드 × 부족 영양소)</b> 단위 데이터로, 같은 성분이라도 부족 영양소가 다르면 내용이 다릅니다. 이 화면에서는 <b>조회만</b> 가능하며 수정은 슈퍼어드민(굿팜)에서 관리합니다.</div>';
  document.getElementById('mFoot').innerHTML=
    '<button class="btn" onclick="closeDetail()">취소</button>'+
    '<button class="btn primary" onclick="saveDetail()">저장</button>';
  renderProds();
  document.getElementById('detailBg').classList.add('open');
}
// 관련 약물(조회 전용) — 성분코드·성분명·제형·부족해지는 이유
function relDrugsHtml(drugs){
  if(!drugs || !drugs.length) return '<div class="readbox">연결된 약물 데이터가 없습니다.</div>';
  return '<div class="tbl" style="overflow:auto"><table><thead><tr>'+
    '<th>성분코드</th><th>성분명</th><th>제형</th><th>부족해지는 이유</th></tr></thead><tbody>'+
    drugs.map(function(d){
      return '<tr><td style="white-space:nowrap;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#8a9099">'+d.code+'</td>'+
        '<td style="white-space:nowrap">'+d.comp+'</td><td style="white-space:nowrap">'+(d.form||'-')+'</td>'+
        '<td style="white-space:normal;min-width:200px">'+(d.reason||'-')+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}
function openAdd(){
  mode='new';
  cur={ id:++seq, nut:'', comp:'', sum:'', info:'', prods:[], history:[] };
  document.getElementById('mTitle').textContent='부족 영양소 항목 추가';
  document.getElementById('mSub').textContent='어드민에서 항목을 하나씩 등록합니다.';
  document.getElementById('basicH').innerHTML='기본 정보';
  document.getElementById('infoH').innerHTML='관련 약물';
  document.getElementById('mBasic').innerHTML=
    '<div class="kv"><div class="k">부족 영양소</div><div class="v"><input class="inp fw" id="fNut" placeholder="예: 비타민 B12" oninput="cur.nut=this.value"></div></div>'+
    '<div class="kv"><div class="k">관련 약물</div><div class="v"><input class="inp fw" id="fComp" placeholder="예: 메트포르민" oninput="cur.comp=this.value"></div></div>'+
    '<div class="kv"><div class="k">목록 요약</div><div class="v"><input class="inp fw" id="fSum" placeholder="목록에 표기할 한 줄 요약" oninput="cur.sum=this.value"></div></div>';
  document.getElementById('mInfoWrap').innerHTML=
    '<textarea class="inp" id="fInfo" placeholder="AI mate에 노출될 부족해지는 근거를 입력하세요." oninput="cur.info=this.value"></textarea>';
  document.getElementById('mFoot').innerHTML=
    '<button class="btn" onclick="closeDetail()">취소</button>'+
    '<button class="btn primary" onclick="saveDetail()">항목 저장</button>';
  renderProds();
  document.getElementById('detailBg').classList.add('open');
}

function renderHist(){
  var c=document.getElementById('mHist');
  var h=(cur.history||[]).slice().reverse();
  if(!h.length){ c.innerHTML='<div class="hrow"><span class="hnote" style="color:#9aa4af">변경 이력이 없습니다.</span></div>'; return; }
  c.innerHTML=h.map(function(e){
    return '<div class="hrow"><span class="hd">'+e.date+'</span>'+
      '<span class="hby '+e.by+'">'+byLabel(e.by)+'</span>'+
      '<span class="hnote">'+e.note+'</span></div>';
  }).join('');
}
function renderProds(){
  var c=document.getElementById('mProds');
  // 굿팜(기본, def=true): 슈퍼어드민 등록 → 읽기 전용 / 우리약국(def=false): 약사 등록 → 수정 가능(최대 3)
  var gp=cur.prods.filter(function(p){return p.def;});
  var store=cur.prods.filter(function(p){return !p.def;});
  var gpHtml = gp.length
    ? gp.map(function(p){ return '<div class="pitem ro"><div class="pn"><div class="nm">'+p.nm+'</div><div class="bc" style="font-family:inherit">제조사 · '+mfrOf(p)+'</div></div><span class="kd gp">굿팜(기본)</span></div>'; }).join('')
    : '<div class="pempty">슈퍼어드민 기본 추천 상품이 없습니다.</div>';
  var multi=store.length>1;
  var storeHtml = store.length
    ? store.map(function(p,si){ var gi=cur.prods.indexOf(p);
        var ord = multi ? '<div class="ord"><button onclick="moveStore('+gi+',-1)">▲</button><button onclick="moveStore('+gi+',1)">▼</button></div><span class="pnum">'+(si+1)+'</span>' : '';
        return '<div class="pitem">'+ord+'<div class="pn"><div class="nm">'+p.nm+'</div><div class="bc" style="font-family:inherit">제조사 · '+mfrOf(p)+'</div></div><button class="btn sm danger" onclick="delP('+gi+')">삭제</button></div>'; }).join('')
    : '<div class="pempty">등록한 우리약국 추천 상품이 없습니다. 서버 마스터 상품에서 검색해 추가하세요.</div>';
  c.innerHTML =
    '<div class="pg-h">굿팜 추천 상품 <span class="info" tabindex="0">ⓘ<span class="tip-pop">이 상품은 <b>슈퍼어드민이 등록한 기본 추천 상품</b>입니다. 약국에서는 수정·삭제할 수 없으며, 아래 <b>우리약국 추천 상품</b>만 등록·정렬·삭제할 수 있습니다.</span></span></div>'+gpHtml+
    '<div class="pg-h store">우리약국 추천 상품 <span class="pg-cnt">'+store.length+' / '+MAX_PRODS+'</span></div>'+storeHtml;
  var atMax=store.length>=MAX_PRODS;
  document.getElementById('mHint').innerHTML = atMax
    ? '<b style="color:var(--amber)">우리약국 추천 상품 최대 '+MAX_PRODS+'개에 도달했습니다.</b>'
    : '우리약국 설정 상품은 굿팜(기본) 추천보다 우선 노출됩니다.';
}
function moveP(i,d){ var j=i+d; if(j<0||j>=cur.prods.length)return; var t=cur.prods[i];cur.prods[i]=cur.prods[j];cur.prods[j]=t; renderProds(); }
// 우리약국(비-def) 상품끼리만 순서 이동
function moveStore(gi,d){
  var order=[]; cur.prods.forEach(function(p,idx){ if(!p.def) order.push(idx); });
  var pos=order.indexOf(gi), np=pos+d; if(np<0||np>=order.length) return;
  var a=order[pos], b=order[np], t=cur.prods[a]; cur.prods[a]=cur.prods[b]; cur.prods[b]=t; renderProds();
}
function delP(i){ cur.prods.splice(i,1); renderProds(); }
function deleteItem(){
  if(mode==='new'){ closeDetail(); return; }
  if(!confirm('이 항목을 삭제할까요? 삭제하면 AI mate 추천에서 제외되며, 삭제 이력은 어디에도 남지 않습니다.')) return;
  var idx=rows.findIndex(function(x){return x.id===cur.id});
  if(idx>-1) rows.splice(idx,1);
  renderList(); closeDetail(); toast('항목을 삭제했습니다. (삭제 이력은 남지 않습니다)');
}
function restoreDefault(){
  cur.prods = (cur.defaults||[]).map(clone);
  if(!cur.prods.length) toast('기본 추천 상품이 없어 근거 정보만 노출됩니다.');
  else toast('기본 추천 상품으로 복원했습니다. (저장 시 적용)');
  renderProds();
}
function saveDetail(){
  if(mode==='new'){
    if(!cur.nut.trim()){ toast('부족 위험 영양소명을 입력해 주세요.'); return; }
    if(!cur.sum.trim()) cur.sum = cur.info.trim().slice(0,40) || '요약 미입력';
    cur.mod='2026-06-26'; cur.modBy=ME;
    cur.history=[{date:'2026-06-26', by:ME, note:'항목 신규 등록'}];
    rows.push(cur);
    renderList(); closeDetail(); toast('새 항목을 추가했습니다.');
    return;
  }
  var idx=rows.findIndex(function(x){return x.id===cur.id});
  cur.mod='2026-06-26'; cur.modBy=ME;
  cur.history=(cur.history||[]).concat([{date:'2026-06-26', by:ME, note:'추천 상품 설정 변경'}]);
  rows[idx]=cur; renderList(); closeDetail(); toast('추천 상품 설정을 저장했습니다. (변경 이력 기록)');
}
function closeDetail(){ document.getElementById('detailBg').classList.remove('open'); }

// 서버 마스터 상품 검색 모달
function storeCount(){ return cur.prods.filter(function(p){return !p.def;}).length; }
function openSearch(){
  if(storeCount()>=MAX_PRODS){ toast('우리약국 추천 상품은 최대 '+MAX_PRODS+'개까지 추가할 수 있습니다.'); return; }
  document.getElementById('searchInp').value=''; renderRes(); document.getElementById('searchModal').classList.add('open');
}
function closeSearch(){ document.getElementById('searchModal').classList.remove('open'); }
function renderRes(){
  var q=document.getElementById('searchInp').value.trim();
  var list=DB.filter(function(d){ return !q || d.bc.indexOf(q)>-1 || d.nm.indexOf(q)>-1; });
  var c=document.getElementById('searchRes');
  if(!list.length){ c.innerHTML='<div class="r" style="color:#9aa4af;cursor:default">검색 결과가 없습니다.</div>'; return; }
  c.innerHTML=list.map(function(d){
    return '<div class="r" onclick="addProd(\''+d.bc+'\')"><div><div class="nm">'+d.nm+'</div><div class="bc" style="font-family:inherit">제조사 · '+mfrOf(d)+'</div></div><span class="add">＋ 추가</span></div>';
  }).join('');
}
function addProd(bc){
  if(storeCount()>=MAX_PRODS){ toast('우리약국 추천 상품은 최대 '+MAX_PRODS+'개까지 추가할 수 있습니다.'); return; }
  var d=DB.find(function(x){return x.bc===bc});
  if(cur.prods.some(function(p){return p.bc===bc})){ toast('이미 추가된 상품입니다.'); return; }
  cur.prods.push({nm:d.nm, bc:d.bc, kind:d.kind, mfr:d.mfr, def:false});
  renderProds(); closeSearch(); toast('우리약국 추천 상품으로 추가했습니다.');
}
var te=document.getElementById('toast'),tt;
function toast(m){ te.textContent=m; te.classList.add('show'); clearTimeout(tt); tt=setTimeout(function(){te.classList.remove('show')},2200); }
// 각 항목의 기본값(기본 추천 상품) 스냅샷 — 「기본값 복원」 기준
rows.forEach(function(r){ r.defaults = r.prods.filter(function(p){return p.def}).map(clone); });
renderList();
</script>
</body>
</html>
